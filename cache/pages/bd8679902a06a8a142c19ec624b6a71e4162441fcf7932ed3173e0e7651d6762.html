<div class="container">
  <div class=" BodyHeadline">Password Request</div>
<form method="post" name="frmReqPassword" class="form" id="frmReqPassword" action="procPassword_Request.asp">
  <div class="form-group">
    <label></label>
    Please enter your username and an email will be sent to the Primary Contact for the Organization with the password on file.
  </div>
  <div class="form-group">
  <div class="form-group col-sm-4">
    <label for="username">Username:</label>&nbsp;&nbsp;<em>(Username is case sensitive)</em>
    <input name="Username" type="text" required="true" class="form-control" id="Username" placeholder="enter username here" data-msg-required="Username is required." data-msg-nowhitespace="No spaces please." data-rule-nowhitespace="true"><br>
  </div>
  </div>
<div class="form-group">
	<div class="col-sm-12">
  <button type="submit" class="btn btn-FF">Request Password</button></div>
</div>
</form>

<br />
