    <style>
      :root {
        --main-bg-color: #f5f5f5;
        --border-color: #f3f3f3;
        --white: #fff;
        --blue: #196fb6;
        --light-blue: #a2c1db;
        --light-blue-2: #e0ecf6;
        --dark-grey: #59595c;
      }

      body {
        margin: 0;
        overflow-x: hidden;
      }

      .sun {
        height: 61px;
        position: absolute;
        z-index: -1;
        top: 95px;
        right: 15%;
        -webkit-animation-name: sunrise;
        -webkit-animation-duration: 4s;
        -webkit-animation-iteration-count: infinite;
        -webkit-animation-timing-function: linear;
        -moz-animation-name: sunrise;
        -moz-animation-duration: 4s;
        -moz-animation-iteration-count: infinite;
        -moz-animation-timing-function: linear;
        -ms-animation-name: sunrise;
        -ms-animation-duration: 4s;
        -ms-animation-iteration-count: infinite;
        -ms-animation-timing-function: linear;
      }

      /* change this to match height of top-nav if there is a discression with height */
      /* Change to correct selector example: wcss-idm-layout, wcss-secure-layout */

      #loader-temp-secure .main-stage {
        margin-top: -40px;
      }

      .wrapper {
        text-align: center;
        width: 100%;
        padding-top: 30px;
      }

      .ghost h3 {
        font-family: "Lato", sans-serif;
        margin: 0 auto;
        text-align: center;
        display: inline;
        font-weight: 300;
        margin-left: 3%;
        color: var(--dark-grey);
        font-size: 1.5em;
      }

      .ghost .grid-container {
        max-width: 75em;
        padding: 0 2%;
        margin: 118px auto;
        display: block;
      }

      .ghost-edge .grid-container {
        margin: 118px auto;
      }

      @media screen and (max-width: 768px) {
        .solar-panel-wrapper .solar-panel {
          width: 160px;
          padding-left: 35px;
        }

        .blade-wrapper .rotate {
          margin-left: -17px;
        }

        .blade-wrapper .rotate-tall {
          left: -3%;
        }

        .turbine .center-align {
          justify-content: space-around;
        }

        .ghost .grid-container {
          margin: 100px auto;
        }

        .ghost-edge .grid-container {
          margin: 118px auto;
        }

      }

      @media screen and (max-width: 500px) {
        .blade-wrapper .rotate {
          margin-left: -3%;
        }

        .blade-wrapper .rotate-tall {
          left: 0px;
          width: 300px;
        }

        .ghost .sun {
          right: auto;
        }

        .ghost .grid-container {
          margin: 100px auto;
        }

        .ghost-edge .grid-container {
          margin: 118px auto;
        }

      }

      @supports (-ms-ime-align: auto) {
        .ghost h3 {
          background: none;
          color: #b3b4b4;
          -webkit-text-fill-color: inherit;
        }
      }

      .ghost main {
        display: flex;
        max-width: 75em;
        padding: 0 2%;
        flex-direction: row;
        justify-content: space-between;
      }

      .ghost main .main-stage {
        width: 100%;
        border-radius: 3px;
        display: flex;
        justify-content: space-between;
      }

      .rotate {
        -webkit-animation-name: rotate;
        -webkit-animation-duration: 7s;
        -webkit-animation-iteration-count: infinite;
        -webkit-animation-timing-function: linear;
        animation-name: rotate;
        animation-duration: 7s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
        -moz-animation-name: rotate;
        -moz-animation-duration: 7s;
        -moz-animation-iteration-count: infinite;
        -moz-animation-timing-function: linear;
        -ms-animation-name: rotate;
        -ms-animation-duration: 7s;
        -ms-animation-iteration-count: infinite;
        -ms-animation-timing-function: linear;
      }

      .turbine {
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      .tower {
        position: relative;
        width: 150px;
        margin-top: -100px;
      }

      .tower-tall {
        width: 222px;
      }

      .blade-wrapper {
        position: relative;
        display: flex;
        height: 350px;
        margin: -222px auto 0 auto;
        max-width: 40em;
      }

      .solar-panel-wrapper {
        display: flex;
        max-width: 20em;
        margin: 0 auto;
      }

      .rotate {
        width: 200px;
        z-index: 100;
        margin-left: 82px;
        margin-top: 92px;
      }

      .rotate-tall {
        width: 430px;
        position: relative;
        left: -135px;
        top: -25px;
      }

      .solar-panel {
        width: 242px;
        height: auto;
        margin: -82px auto 0 auto;
        padding-left: 60px;
      }

      .center-align {
        max-width: 40em;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        height: 180px;
        overflow: hidden;
      }

      .ghost-edge {
        display: none;
      }

      .ghost-edge main svg{
        margin: 0 auto;
        display: block;
        max-width: 96%;
      }

      @supports (-ms-ime-align: auto) {
        .ghost {
          display: none !important;
        }

        .ghost-edge {
          display: block !important;
        }
      }

      @keyframes shine {
        from {
          background-position: 100% 100%;
        }
        to {
          background-position: 0% 0%;
        }
      }

      @-webkit-keyframes shine {
        from {
          -webkit-background-position: 100% 100%;
        }
        to {
          -webkit-background-position: 0% 0%;
        }
      }

      @-moz-keyframes shine {
        from {
          -moz-background-position: 100% 100%;
        }
        to {
          -moz-background-position: 0% 0%;
        }
      }

      @-ms-keyframes shine {
        from {
          -ms-background-position: 100% 100%;
        }
        to {
          -ms-background-position: 0% 0%;
        }
      }
      @-webkit-keyframes sunrise {
        0% {
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        50% {
        }
        75% {
          opacity: 1;
        }

        100% {
          opacity: 0;
        }
      }

      @-webkit-keyframes rotate {
        from {
          -webkit-transform: rotate(0deg);
        }
        to {
          -webkit-transform: rotate(360deg);
        }
      }

      @-ms-keyframes rotate {
        from {
          -ms-transform: rotate(0deg);
        }
        to {
          -ms-transform: rotate(360deg);
        }
      }

      @-moz-keyframes rotate {
        from {
          -moz-transform: rotate(0deg);
        }
        to {
          -moz-transform: rotate(360deg);
        }
      }

      @-webkit-keyframes progressbar {
        0% {
          width: 0%;
          background-position: top left;
        }
        100% {
          width: 90%;
          background-position: bottom right;
        }
      }

      @-moz-keyframes progressbar {
        0% {
          width: 0%;
          background-position: top left;
        }
        100% {
          width: 90%;
          background-position: bottom right;
        }
      }

      @-ms-keyframes progressbar {
        0% {
          width: 0%;
          background-position: top left;
        }
        100% {
          width: 90%;
          background-position: bottom right;
        }
      }

      @-o-keyframes progressbar {
        0% {
          width: 0%;
          background-position: top left;
        }
        100% {
          width: 90%;
          background-position: bottom right;
        }
      }

      @keyframes progressbar {
        0% {
          width: 0%;
          background-position: top left;
        }
        100% {
          width: 90%;
          background-position: bottom right;
        }
      }

      @-webkit-keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }

      @-moz-keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }

      @-ms-keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }

      @-o-keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }

      
    </style>
