const unav_url = "https://unav.t-mobile.com/client/unav.min.js?unav=phx";
let userAgent = navigator.userAgent;
if (

  let unav_css = document.createElement("link");
  unav_css.setAttribute("href", "https://unav.t-mobile.com/client/styles.min.css");
  unav_css.setAttribute("rel", "stylesheet");
  unav_css.setAttribute("type", "text/css");

  let unav_script = document.createElement("script");

  document.head.appendChild(unav_css);
  document.head.appendChild(unav_script);
  const fcomponent = document.querySelector('tmo-digital-footer');

  function waitForElement(selector, callback) {
    const element = document.querySelector(selector);
    if (element) {
      callback(element);
      return;
    }
    const observer = new MutationObserver((mutationsList, observer) => {
      for (const mutation of mutationsList) {
        if (mutation.type === 'childList') {
          const foundElement = mutation.target.querySelector(selector);
          if (foundElement) {
            callback(foundElement);
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  const DNT = "dnt";
  const DONOTSELL = "DoNotSell";
  const SELL = "Sell";
  const ONE = "1";
  const ZERO = "0";

  function getCookieByName(name) {
    const value = "; " + document.cookie;
    const parts = value.split("; " + name + "=");
    if (parts.length === 2) {
      return parts.pop().split(";").shift();
    }
  }

  function setDntCookie(value) {
    document.cookie = "dnt=" + (value || "") + "; expires=Fri, 31 Dec 9999 23:59:59 GMT; domain=.t-mobile.com;path=/";
  }

  document.addEventListener('DOMContentLoaded', () => {
    waitForElement('tmo-digital-footer', (element) => {
      element.addEventListener('digitalUnavEvent', (event) => {
        if (event.detail=='opendnspage') {
          // Call the function to open the popup and send POST data
          openPopupWithPostRequest();
        }
      });
      // Listen for messages from the popup
      window.addEventListener("message", (event) => {
        if (event.origin === 'https://www.t-mobile.com/dns' && event.data && typeof event.data === "string") {
          const newValue = event.data === DONOTSELL ? ONE : ZERO;
          setDntCookie(newValue)
        }
      });
    });
  });

  function openPopupWithPostRequest() {
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'https://www.t-mobile.com/dns';
    form.target = 'popup';

    // Add data to the form
    const input1 = document.createElement('input');
    input1.type = 'hidden';
    input1.name = 'Brand';
    input1.value = 'Magenta';
    form.appendChild(input1);
    const input2 = document.createElement('input');
    input2.type = 'hidden';
    input2.name = 'Site';
    input2.value = 'Sell_Web';
    form.appendChild(input2);
    const input3 = document.createElement('input');
    input3.type = 'hidden';
    input3.name = 'Origin_URL';
    input3.value = window.location.origin + window.location.pathname;
    form.appendChild(input3);
    const input4 = document.createElement('input');
    input4.type = 'hidden';
    input4.name = 'LocaldoNotSellSetting';
    input4.value = getCookieByName(DNT) === ONE ? DONOTSELL : SELL;
    form.appendChild(input4);

    // Add the form to the document and submit it
    document.body.appendChild(form);
    window.open('https://www.t-mobile.com/dns', 'popup', 'width=800,height=800,resizable,scrollbars');
    form.submit();
    document.body.removeChild(form);
  }

  // T-Mobile for Business (TFB) "Get Started" button #3550
  document.addEventListener('DOMContentLoaded', () => {
    waitForElement('tmo-digital-header', (element) => {
      element.addEventListener('digitalUnavEvent', (event) => {
        if (event.detail=='getStartedModalEvent') {
          window.open("https://www.t-mobile.com/business/b2b-contact-information", '_blank').focus();
        }
      });
    });
  });
}

    /* Banner Container */
.promo-banner {
    background-color: #000000;
    color: #ffffff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

/* Message Text */
.banner-message {
    font-size: 14px;
    line-height: 1.4;
}

.banner-message .highlight {
    font-weight: 900;
    font-size: 20px;
    color: #E20074;
}

.banner-message .regular {
    font-size: 14px;
    font-weight: 400;
}

/* CTA Buttons Container */
.banner-ctas {
    display: flex;
    gap: 12px;
    align-items: center;
}

/* Button Base Styles */
.btn {
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    display: inline-block;

    background-color: #861B54;
    color: #ffffff;

}

.btn-primary:hover {
    background-color: #C5006A;

}

    background-color: transparent;
    color: #ffffff;
    border-color: #ffffff;
}

function determineEventSpec(el) {
  const clickToCallEvents = ['Call-Store', 'Locator-Card-Text-Call', 'Locator-Card-Button-Call'];
  const clickToNavigateEvents = ['Cta-Banner', 'learn-more', 'Store-Details', 'All-Products', 'Webstore-Link-Ship'];
  const clickToActionEvents = ['Navigate-To-Store', 'Locator-Card-Text-Get-Directions', 'Locator-Card-Button-Get-Directions'];

  if (el.getAttribute("data-toggle") === "modal") {
      
      var pageData = {
          'cdl.page.modalName': getModalName(el)
      };
      triggerPageViewAnalytics(['trackModal', pageData]);

  } else if (el.getAttribute("data-dismiss") === "modal") {
      
      triggerPageViewAnalytics(['closeModal']);
  } else if (el.getAttribute('data-ga') || el.getAttribute('data-ga-ec') || el.getAttribute('data-dl2') || el.getAttribute('data-dl2-ec')) {
      
      const attValue = el.getAttribute('data-ga') || el.getAttribute('data-ga-ec') || el.getAttribute('data-dl2') || el.getAttribute('data-dl2-ec');
      switch (attValue) {
          case (clickToCallEvents.indexOf(attValue) + 1 && attValue):
              
              var widgetData = {
                  'cdl.widgetName': 'Button Click : ' + getCtaName(el), //For ex: Button Click : 1-800-917-6100
                  'cdl.widgetHref': getPhoneNumber(el.href)
              }
              triggerPageViewAnalytics(['trackWidget', widgetData]);
              break;

          case (clickToNavigateEvents.indexOf(attValue) + 1 && attValue):
              
              var clickData = {
                  'cdl.page.icidList': 'Button Click : ' + getCtaName(el) + ' : ' + getIcid(el.href) //for ex: Button Click : Shop plans : ICID
              };
              triggerPageViewAnalytics(['trackClick', clickData]);
              break;

          case (clickToActionEvents.indexOf(attValue) + 1 && attValue):
              
              var widgetData = {
                  'cdl.widgetName': 'Button Click : ' + getCtaName(el), //For ex: Button Click : 1-800-917-6100
              }
              triggerPageViewAnalytics(['trackWidget', widgetData]);
              break;
              
          default:
              break;
      }
  }
}

function getIcid(href) {
  if (href) {
    var url = new URL(href)
    let icid = url.searchParams.get("ICID") || url.searchParams.get("icid");
    if (icid) {
      return icid
    }
  }
  return ""
}

function getCtaName(el) {
  
  if (
    el.firstElementChild
    && el.firstElementChild.firstElementChild
    && el.firstElementChild.firstElementChild.classList.contains("material-icons")
  ) {
    let iconName = el.firstElementChild.innerText.trim().replace(/(\r\n|\n|\r)/gm, "");
    return el.innerText.trim().replace(/(\r\n|\n|\r)/gm, "").replace(iconName, "");
  }
  
  else if (el.firstElementChild && el.firstElementChild.innerText) {
    return el.firstElementChild.innerText.trim().replace(/(\r\n|\n|\r)/gm, "")
  
  } else if (el.innerText.trim()) {
    return el.innerText.trim().replace(/(\r\n|\n|\r)/gm, "")
  
  } else if (el.firstElementChild.tagName === "IMG" && el.firstElementChild.alt) {
    return el.firstElementChild.alt
  
  } else {
    return ""
  }
}


function getPhoneNumber(href) {
  if (href && href.startsWith("tel:")) {
    return href.replace("tel:", "");
  }
  return "";
}

function createAutocomplete(ac_textbox) {
  var new_ac = function pacSelectFirst(input) {
    // store the original event binding function
    var _addEventListener = (input.addEventListener) ? input.addEventListener : input.attachEvent;
    function addEventListenerWrapper(type, listener) {
      // Simulate a 'down arrow' keypress on hitting 'return' when no pac suggestion is selected,
      // and then trigger the original listener.
      if (type == "keydown") {
        var orig_listener = listener;
        listener = function(event) {
          var suggestion_selected = $(".pac-item-selected").length > 0;
          if (event.which == 13 && !suggestion_selected) {
            var simulated_downarrow = $.Event("keydown", {
              keyCode: 40,
              which: 40
            });
            orig_listener.apply(input, [simulated_downarrow]);
          }
          orig_listener.apply(input, [event]);
        };
      }
      _addEventListener.apply(input, [type, listener]);
    }
    input.addEventListener = addEventListenerWrapper;
    input.attachEvent = addEventListenerWrapper;
    var autocomplete = new google.maps.places.Autocomplete(input);
    return autocomplete;
  }(ac_textbox);

  google.maps.event.addListener(new_ac, 'place_changed', function () {
  var place = new_ac.getPlace();
  if (!place.geometry) {
    
    showLocationError("Please select a location from the suggestions.");
    return;
  } else {
    if (place.address_components) {
      ac_textbox.setAttribute('value', place.formatted_address);
      createOrUpdateFormInput('locInput', 'loc', place.formatted_address);
    }
    createOrUpdateFormInput('latInput', 'lat', place.geometry.location.lat());
    createOrUpdateFormInput('lonInput', 'lon', place.geometry.location.lng());
    document.querySelector('vue-location-finder').__vue_custom_element__.$children[0].renderLocationSuccess();
    submitLocation();
  }
  });
}

function initLocationAutocomplete() {
  var inputList = document.getElementsByClassName('locPacInput');
  var inputArray = Array.prototype.slice.call(inputList);
  geocoder = new google.maps.Geocoder();
  for (var i = 0; i < inputList.length; ++i) {
  createAutocomplete(inputArray[i]);
  }

}

function createOrUpdateFormInput(eltSelector, name, value){
  if (document.getElementById(eltSelector)) {
    document.getElementById(eltSelector).setAttribute('value', value);
  } else {
    var newInput = '<input name="' + name + '" value="' + value + '" type="hidden" />';
    document.getElementById('searchForm').innerHTML += (newInput);
  }
}

function submitLocation() {
  var event = new CustomEvent("storeLocatorSearchBar__searchClick");
  document.dispatchEvent(event);
  
  
    document.getElementById('searchForm').action = "/stores/locator";
  
  document.getElementById('searchForm').submit();
}

function autocompleteLocate() {
  if (navigator.geolocation) {
    var timeoutVal = 5 * 1000;
    navigator.geolocation.getCurrentPosition(
      setPosition,
      displayLocationErrorFromCode,
      { enableHighAccuracy: true, timeout: timeoutVal, maximumAge: 0 }
    );
  } else {
    displayLocationError("Geolocation is not supported by this browser");
  }
}

function setPosition(position) {
  
  var lat = position.coords.latitude;
  var lon = position.coords.longitude;
  createOrUpdateFormInput('latInput', 'lat', lat);
  createOrUpdateFormInput('lonInput', 'lon', lon);
  codeLatLng(lat, lon);
}

function displayLocationErrorFromCode(error) {
  console.warn(`ERROR(${error.code}): ${error.message}`);
  var errors = {
    1: 'Permission denied. Please ensure location services are enabled for your browser or type your location in the box.',
    2: 'Position unavailable',
    3: 'Request timeout'
  };

  showLocationError("Error: " + errors[error.code]);
}

function showLocationError(error) {
  document.querySelector('vue-location-finder').__vue_custom_element__.$children[0].renderLocationError(error);
  setTimeout(function () {
    document.querySelector('vue-location-finder').__vue_custom_element__.$children[0].renderLocationInit();
  }, 12500);
}

function codeLatLng(lat, lon) {
  
  var latlng = new google.maps.LatLng(lat, lon);
  geocoder.geocode({'latLng': latlng}, function(results, status) {
    if (status == google.maps.GeocoderStatus.OK) {
      if (results[1]) {
        document.getElementsByClassName('locPacInput')[0].setAttribute('value', results[1].formatted_address);
        createOrUpdateFormInput('locInput', 'loc', results[1].formatted_address);
        document.querySelector('vue-location-finder').__vue_custom_element__.$children[0].renderLocationSuccess();
        submitLocation();
      }
    } else {
      showLocationError("Geocoder failed due to: " + status);
    }
  });
}

function extractAllText(element) {
  
  let text = '';
  function traverse(node) {
    
    if (node.nodeType === Node.TEXT_NODE) {
      text += node.nodeValue.trim() + ' ';
    } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
      node.childNodes.forEach(child => traverse(child));
    }
  }
  traverse(element);
  return text.slice(0, 100).trim();
}


function slugify(text) {
    return text
        .toLowerCase() // Convert to lowercase
        .trim() // Trim leading/trailing whitespace
        .replace(/[\s\W-]+/g, '-') // Replace spaces and non-word characters with hyphens
        .replace(/^-+|-+$/g, ''); // Remove leading/trailing hyphens
}



function getDatalayerClickType(thisObj) {
  let urlBase = new URL('https://www.t-mobile.com/stores');
  let href = thisObj.attr('href');
  let linkType;

  if (!href) {
    
    linkType = 'page-action';
  } else {
    
    let link = thisObj.get(0); // Equivalent to thisObj[0]
    
    if (href.startsWith('#') || href.startsWith('javascript:')) {
      linkType = 'page-action';
    } else if (
        (link.hostname === window.location.hostname && link.pathname.startsWith(urlBase.pathname))
        || href.startsWith(urlBase.pathname)
        || href.startsWith('?')
    ) {
      linkType = 'internal';
    } else {
      linkType = 'external';
    }
  }

  return linkType;
}


function findAncestorDataAttrValue(dataAttr, thisObj, containingFrame = null) {
  let currentElement = thisObj;

  while (currentElement.length > 0 && !currentElement.attr(dataAttr)) {
    currentElement = currentElement.parent();
  }

  if (currentElement.length > 0) {
    return currentElement.attr(dataAttr);
  } else if (containingFrame) {
    
    return findAncestorDataAttrValue(dataAttr, containingFrame);
  } else {
    return "";
  }
}

function categorizePhoneNumberTags(unique_text) {
  
  
  var re = new RegExp("^[\\d\\-\\+\\(\\)\\s]{7,}$");
  if (re.test(unique_text)) {
    return "phone"
  } else {
    return unique_text
  }
}

function isInExcludedSection(element) {
  return $(element).closest('[data-dl2-nocatchall="true"]').length > 0;
}


function shouldTrackIframe(iframe) {
  let $iframe = $(iframe);

  
  let $parent = $iframe.closest('[id*="aemwidget"], [id*="customcodewidget"], [id*="featuredpromotionwidget"]');
  if ($parent.length > 0) {
    return true;
  }

  return false;
}


function dl2UpdateGTMClickHandlersInIframe(iframe) {
  if (isInExcludedSection(iframe)) {
    return;
  }
  if (!shouldTrackIframe(iframe)) {
    return;
  }
  
  $(iframe).on('load', function() {
    let iframeDoc;
    try {
      iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
    } catch (error) {
      if (error instanceof DOMException && error.name === 'SecurityError') {
        console.warn('DL2: Cross-origin iframe detected - cannot access iframe content due to browser security (Same-Origin Policy).');
        console.info('DL2: Alternative tracking enabled for iframe:', $(iframe).attr('src'));
        console.info('DL2: Tracking iframe load events and basic user interactions via window blur detection.');
        return;
      } else {
        throw error;
      }
    }

    $(iframeDoc).find('[data-dl2]').on({
      click: function() {dl2SendGaDataLayer($(this), '')},
      auxclick: function() {dl2SendGaDataLayer($(this), '')},
      contextmenu: function() {dl2SendGaDataLayer($(this), '-RC')}
    });

    $(iframeDoc).find('[data-dl2-ec]').on({
      click: function() {sendDl2EcDataLayer($(this), '')},
      auxclick: function() {sendDl2EcDataLayer($(this), '')},
      contextmenu: function() {sendDl2EcDataLayer($(this), '-RC')}
    });

    $(iframeDoc).on({
      click: function() {dl2SendGaDataLayer($(this), '')},
      auxclick: function() {dl2SendGaDataLayer($(this), '')},
      contextmenu: function() {dl2SendGaDataLayer($(this), '-RC')}
    }, '[data-dl2]');

    $(iframeDoc).on({
      click: function() {sendDl2EcDataLayer($(this), '')},
      auxclick: function() {sendDl2EcDataLayer($(this), '')},
      contextmenu: function() {sendDl2EcDataLayer($(this), '-RC')}
    }, '[data-dl2-ec]');
    
    $(iframeDoc).find('a:not([data-dl2])').on({
      click: function() {catchallHandler($(this), '', $(iframe))},
      auxclick: function() {catchallHandler($(this), '', $(iframe))},
      contextmenu: function() {catchallHandler($(this), '-RC', $(iframe))}
    });
    console.log('DL2: Same-origin iframe analytics handlers attached successfully:', $(iframe).attr('src'));
  });
}

function trackCrossOriginIframeInteraction(iframe) {
  if (!shouldTrackIframe(iframe)) {
    return;
  }

  let $iframe = $(iframe);

  
  if ($iframe.attr('data-dl2-focus-tracking') === 'true') {
    return;
  }

  
  $iframe.attr('data-dl2-focus-tracking', 'true');

  let focusEnterCount = 0;

  
  $iframe.on('mouseover', function() {
    $iframe.data('mouse-over-iframe', true);
  });

  $iframe.on('mouseout', function() {
    $iframe.data('mouse-over-iframe', false);
  });

  window.addEventListener('blur', function handleIframeFocusEnter() {
    setTimeout(function() {
      
      if (document.activeElement &&
          document.activeElement.tagName === 'IFRAME' &&
          document.activeElement === iframe &&
          $(iframe).data('mouse-over-iframe')) {

          'e216_click_content_meta_5': findAncestorDataAttrValue('data-dl2-e216', $iframe),
          'e217_click_html_element_text': 'iframe-focus-enter-' + focusEnterCount,
          'e218_click_html_element_href': $iframe.attr('src') || ''
        };

        $.extend(dlUpdate, dl);
        
        dataLayer.push(dlUpdate);

        console.log('DL2: Iframe focus enter (#' + focusEnterCount + '):', $iframe.attr('src'));
      }
    }, 0);
  });
}


function trackCrossOriginIframeExit(iframe) {
  if (!shouldTrackIframe(iframe)) {
    return;
  }

  let $iframe = $(iframe);

  
  if ($iframe.attr('data-dl2-focus-exit-tracking') === 'true') {
    return;
  }

  
  $iframe.attr('data-dl2-focus-exit-tracking', 'true');

  let focusExitCount = 0;
  let lastActiveElement = null;

  window.addEventListener('focus', function handleIframeFocusExit() {
    
    setTimeout(function() {
      if (lastActiveElement === iframe && document.activeElement !== iframe) {
        focusExitCount++;

        let dl = {
          'e200_click_name': 'iframe-focus-exit',
          'e201_click_category': 'iframe-tracking',

        };

        
        let dlUpdate = dl2BuildDataLayer($iframe);
